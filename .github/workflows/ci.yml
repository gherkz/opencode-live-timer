name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test
      - name: Type check
        run: bunx tsc --noEmit
      - name: Lint and format
        run: bunx biome check .
